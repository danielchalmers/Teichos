<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Blocked - Teichos</title>
    <link rel="stylesheet" href="styles/blocked.css" />
  </head>
  <body>
    <div class="container" role="main">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path
            d="M12 3.25 5.75 5.6v5.15c0 4.05 2.55 7.7 6.25 9.05 3.7-1.35 6.25-5 6.25-9.05V5.6L12 3.25Z"
            fill="none"
            stroke="currentColor"
            stroke-linejoin="round"
            stroke-width="1.8"
          />
          <path
            d="m8.6 12.1 2.15 2.15 4.85-5"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.8"
          />
        </svg>
      </div>
      <h1>Page Blocked</h1>
      <p>This page has been blocked by Teichos based on your filter settings.</p>
      <div class="url" id="blocked-url" role="status" aria-label="Blocked URL"></div>
      <section class="details" id="block-details" aria-label="Blocking details" hidden>
        <div class="details-header">
          <h2>Blocking details</h2>
        </div>
        <dl class="details-list">
          <div class="detail-row">
            <dt>Filter</dt>
            <dd id="blocked-filter"></dd>
          </div>
          <div class="detail-row" id="blocked-pattern-row" hidden>
            <dt>Pattern</dt>
            <dd id="blocked-pattern"></dd>
          </div>
          <div class="detail-row">
            <dt>Group</dt>
            <dd id="blocked-group"></dd>
          </div>
          <div class="detail-row">
            <dt>Schedule</dt>
            <dd id="blocked-schedule"></dd>
          </div>
        </dl>
      </section>
      <div class="actions">
        <button class="button" id="go-back" type="button">Go Back</button>
        <button class="button secondary" id="open-options" type="button">Manage Filters</button>
      </div>
    </div>
    <script src="./index.ts" type="module"></script>
  </body>
</html>
