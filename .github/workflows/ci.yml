name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck source
        run: npm run typecheck

      - name: Typecheck tests
        run: npm run typecheck:test

  tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Unit tests
        run: npm run test:unit

  build:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build
        run: npm run build

      - name: Verify build output
        run: npm run verify

      - name: Package extension
        run: cd dist && zip -r ../teichos.zip .

      - name: Validate build artifacts
        run: |
          test -d dist
          test -f teichos.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: teichos-build-artifacts
          path: |
            dist/
            teichos.zip
          if-no-files-found: error

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    needs: build
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Download extension dist
        uses: actions/download-artifact@v6
        with:
          name: teichos-build-artifacts
          path: .

      - name: Browser smoke tests
        run: npm run test:e2e

      - name: Prepare Playwright artifacts
        if: always()
        run: |
          rm -rf playwright-artifacts
          mkdir -p playwright-artifacts
          test -d test-results/extension-screenshots
          find test-results/extension-screenshots -maxdepth 1 -type f | grep -q .
          cp -R test-results/extension-screenshots playwright-artifacts/

      - name: Add Playwright failure diagnostics
        if: failure()
        run: |
          test -d playwright-report
          test -d test-results
          cp -R playwright-report playwright-artifacts/
          mkdir -p playwright-artifacts/test-results
          find test-results -mindepth 1 -maxdepth 1 ! -name extension-screenshots -exec cp -R {} playwright-artifacts/test-results/ \;

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: playwright-artifacts/
          if-no-files-found: error
