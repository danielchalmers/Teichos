name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build
        run: npm run verify

      - name: Install Playwright Chromium
        run: npm run playwright:install

      - name: Test extension in Playwright
        run: npm run test:e2e

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: pageblock-extension
          path: dist/
