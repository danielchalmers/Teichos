name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Check formatting
            command: npm run format:check
          - name: Lint
            command: npm run lint
          - name: Typecheck source
            command: npm run typecheck
          - name: Typecheck tests
            command: npm run typecheck:test
          - name: Unit tests
            command: npm run test:unit

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  build:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: npm run verify

      - name: Upload extension dist
        uses: actions/upload-artifact@v7
        with:
          name: teichos-extension-dist
          path: dist/

  package:
    name: Package extension
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download extension dist
        uses: actions/download-artifact@v5
        with:
          name: teichos-extension-dist
          path: dist/

      - name: Package extension
        run: cd dist && zip -r ../teichos.zip .

      - name: Upload extension package
        uses: actions/upload-artifact@v7
        with:
          name: teichos-extension-package
          path: teichos.zip

  e2e:
    name: Browser smoke tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run playwright:install

      - name: Download extension dist
        uses: actions/download-artifact@v5
        with:
          name: teichos-extension-dist
          path: dist/

      - name: Browser smoke tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
