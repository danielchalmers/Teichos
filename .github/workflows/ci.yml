name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  checks:
    name: Fast checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck source
        run: npm run typecheck

      - name: Typecheck tests
        run: npm run typecheck:test

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

  build:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: npm run verify

      - name: Upload extension dist
        uses: actions/upload-artifact@v7
        with:
          name: teichos-extension-dist
          path: dist/

  package:
    name: Package extension
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download extension dist
        uses: actions/download-artifact@v5
        with:
          name: teichos-extension-dist
          path: dist/

      - name: Package extension
        run: cd dist && zip -r ../teichos.zip .

      - name: Upload extension package
        uses: actions/upload-artifact@v7
        with:
          name: teichos-extension-package
          path: teichos.zip

  playwright:
    name: Install Playwright Chromium
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run playwright:install:browsers

      - name: Upload Playwright Chromium
        uses: actions/upload-artifact@v7
        with:
          name: playwright-chromium
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}/

  e2e:
    name: Browser smoke tests
    needs:
      - build
      - playwright
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright Chromium
        uses: actions/download-artifact@v5
        with:
          name: playwright-chromium
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}

      - name: Install Playwright dependencies
        run: npm run playwright:install:deps

      - name: Download extension dist
        uses: actions/download-artifact@v5
        with:
          name: teichos-extension-dist
          path: dist/

      - name: Browser smoke tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
