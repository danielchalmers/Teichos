name: Release and deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in x.y.z format
        required: true
        default: '0.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version format
        id: validate_version
        run: |
          VERSION='${{ github.event.inputs.version }}'
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match x.y.z format" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Fail if tag already exists
        run: |
          TAG="v${{ steps.validate_version.outputs.VERSION }}"
          if git ls-remote --exit-code --tags "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" "refs/tags/$TAG"; then
            echo "Tag $TAG already exists" >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run playwright:install

      - name: Inject release version into manifest
        run: |
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from 'node:fs/promises';

          const manifestPath = 'manifest.json';
          const manifest = JSON.parse(await readFile(manifestPath, 'utf8'));
          manifest.version = '${{ steps.validate_version.outputs.VERSION }}';
          await writeFile(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          EOF

      - name: Run validation pipeline
        run: npm run check

      - name: Package extension
        run: cd dist && zip -r ../teichos-${{ steps.validate_version.outputs.VERSION }}.zip .

      - name: Create tag
        run: |
          TAG="v${{ steps.validate_version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: v${{ steps.validate_version.outputs.VERSION }}
          artifacts: teichos-${{ steps.validate_version.outputs.VERSION }}.zip
