name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Derive release version from tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Tag must match vX.Y.Z (e.g. v1.2.3)." >&2
            exit 1
          fi

          echo "RELEASE_TAG=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"

      - name: Check out
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run source validation
        run: npm run check:fast

      - name: Patch manifest version
        run: |
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from 'node:fs/promises';

          const manifestPath = 'manifest.json';
          const manifest = JSON.parse(await readFile(manifestPath, 'utf8'));
          manifest.version = process.env.RELEASE_VERSION;
          await writeFile(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          EOF

      - name: Format patched manifest
        run: npx prettier --write manifest.json

      - name: Build release artifact
        run: npm run build

      - name: Install Playwright Chromium
        run: npm run playwright:install

      - name: Run e2e tests against release artifact
        run: npm run test:e2e

      - name: Package extension
        run: cd dist && zip -r "../teichos-${RELEASE_VERSION}.zip" .

      - name: Attach release artifact
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          artifacts: teichos-${{ env.RELEASE_VERSION }}.zip
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
