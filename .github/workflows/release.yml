name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 1.2.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Validate version format
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match major.minor.patch (for example 1.2.3)." >&2
            exit 1
          fi

      - name: Check out
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Patch manifest version
        run: |
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from 'node:fs/promises';

          const manifestPath = 'manifest.json';
          const manifest = JSON.parse(await readFile(manifestPath, 'utf8'));
          manifest.version = process.env.RELEASE_VERSION;
          await writeFile(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          EOF

      - name: Install Playwright Chromium
        run: npm run playwright:install

      - name: Run validation pipeline
        run: npm run check

      - name: Package extension
        run: cd dist && zip -r "../teichos-${RELEASE_VERSION}.zip" .

      - name: Create GitHub release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: v${{ env.RELEASE_VERSION }}
          name: v${{ env.RELEASE_VERSION }}
          artifacts: teichos-${{ env.RELEASE_VERSION }}.zip
          skipIfReleaseExists: true
