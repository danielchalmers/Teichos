name: Release and deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in x.y.z format
        required: true
        default: '0.0.0'
      allowUpdates:
        description: Allow updating an existing release for this version
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version format
        id: validate_version
        run: |
          VERSION='${{ github.event.inputs.version }}'
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match x.y.z format" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run playwright:install

      - name: Inject release version into manifest
        run: |
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from 'node:fs/promises';

          const manifestPath = 'manifest.json';
          const manifest = JSON.parse(await readFile(manifestPath, 'utf8'));
          manifest.version = '${{ steps.validate_version.outputs.VERSION }}';
          await writeFile(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          EOF

      - name: Run validation pipeline
        run: npm run check

      - name: Package extension
        run: cd dist && zip -r ../teichos-${{ steps.validate_version.outputs.VERSION }}.zip .

      - name: Create GitHub release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: v${{ steps.validate_version.outputs.VERSION }}
          artifacts: teichos-${{ steps.validate_version.outputs.VERSION }}.zip
          allowUpdates: ${{ inputs.allowUpdates }}
          removeArtifacts: ${{ inputs.allowUpdates }}
