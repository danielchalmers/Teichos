name: Release and deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Patch release workspace version files
        run: |
          npm version "${{ steps.get_version.outputs.VERSION }}" --no-git-tag-version --allow-same-version
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from 'node:fs/promises';

          try {
            const manifestPath = 'public/manifest.json';
            const manifestText = await readFile(manifestPath, 'utf8');
            const manifest = JSON.parse(manifestText);
            manifest.version = process.env.RELEASE_VERSION;
            await writeFile(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            console.error(`Failed to patch public/manifest.json for release: ${message}`);
            process.exit(1);
          }
          EOF
        env:
          RELEASE_VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Build
        run: npm run build

      - name: Verify build
        run: npm run verify

      - name: Install Playwright Chromium
        run: npm run playwright:install

      - name: Test extension in Playwright
        run: npm run test:e2e

      - name: Create extension zip
        run: cd dist && zip -r ../pageblock-${{ steps.get_version.outputs.VERSION }}.zip .

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: pageblock-${{ steps.get_version.outputs.VERSION }}.zip
          skipIfReleaseExists: true
