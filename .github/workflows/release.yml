name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Derive release version from tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Tag must match vX.Y.Z (e.g. v1.2.3)." >&2
            exit 1
          fi

          echo "RELEASE_TAG=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"

      - name: Check out
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Patch extension manifest version
        run: |
          node --input-type=module <<'EOF_NODE'
          import { readFile, writeFile } from 'node:fs/promises';

          const packagePath = 'package.json';
          const pkg = JSON.parse(await readFile(packagePath, 'utf8'));
          pkg.manifest.version = process.env.RELEASE_VERSION;
          await writeFile(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          EOF_NODE

      - name: Package extension
        run: npm run package

      - name: Rename release artifact
        run: mv build/chrome-mv3-prod.zip "teichos-${RELEASE_VERSION}.zip"

      - name: Attach release artifact
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          artifacts: teichos-${{ env.RELEASE_VERSION }}.zip
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
