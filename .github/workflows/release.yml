name: Release artifact

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Patch release workspace version files
        run: |
          npm version "${{ steps.get_version.outputs.VERSION }}" --no-git-tag-version --allow-same-version
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from 'node:fs/promises';

          const manifestPath = 'public/manifest.json';
          const manifest = JSON.parse(await readFile(manifestPath, 'utf8'));
          manifest.version = process.env.RELEASE_VERSION;
          await writeFile(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          EOF
        env:
          RELEASE_VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Build
        run: npm run build

      - name: Verify build
        run: npm run verify

      - name: Install Playwright Chromium
        run: npm run playwright:install

      - name: Test extension in Playwright
        run: npm run test:e2e

      - name: Create extension zip
        run: cd dist && zip -r ../pageblock-${{ steps.get_version.outputs.VERSION }}.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: pageblock-${{ steps.get_version.outputs.VERSION }}
          path: pageblock-${{ steps.get_version.outputs.VERSION }}.zip
